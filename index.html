<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HypeRate 心率监控</title>
    <link rel="icon" type="image/png" sizes="32x32" href="https://designer.hyperate.io/HypeRate_Logo_32.png" />
    <link rel="stylesheet" crossorigin href="https://designer.hyperate.io/assets/index-CHQ-RtlS.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            background: #0b0f17;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body::-webkit-scrollbar { display: none; }
        #root {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            align-items: center;
            flex-wrap: wrap;
        }
        .input-area input, .input-area select {
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            background: #141a28;
            color: #fff;
        }
        .input-area button {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #connectBtn { background: #3b82f6; color: #fff; }
        #connectBtn:hover { background: #2563eb; }
        #disconnectBtn { background: #ef4444; color: #fff; }
        #disconnectBtn:hover { background: #dc2626; }
        .status {
            font-size: 15px;
            margin-bottom: 16px;
            color: #94a3b8;
        }
        .heart-rate {
            font-size: 80px;
            font-weight: bold;
            color: #ff4d4d;
            margin: 20px 0;
        }
        .hr-stat {
            display: flex;
            justify-content: space-around;
            margin: 30px 0;
            padding: 20px;
            background: #141a28;
            border-radius: 12px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-label {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
        }
        .max { color: #ef4444; }
        .min { color: #3b82f6; }
        .avg { color: #10b981; }
        .chart-container {
            height: 400px;
            margin: 32px 0;
        }
        #downloadBtn {
            padding: 14px 28px;
            background: #10b981;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        #downloadBtn:hover { background: #059669; }
    </style>
</head>
<body>
<div id="root">
    <h1>HypeRate 心率监控</h1>
    <div class="input-area">
        <input type="text" id="deviceIdInput" placeholder="输入设备ID，例如: pOi" value="pOi">
        <button id="connectBtn" onclick="startConnect()">连接</button>
        <button id="disconnectBtn" onclick="manualDisconnect()">断开</button>
        <select id="timeRangeSelect" onchange="refreshAll()">
            <option value="1m">近 1 分钟</option>
            <option value="5m">近 5 分钟</option>
            <option value="10m">近 10 分钟</option>
            <option value="30m">近 30 分钟</option>
            <option value="all">全部数据</option>
        </select>
    </div>
    <div class="status" id="statusText">未连接</div>
    <div class="heart-rate" id="currentHr">0</div>

    <div class="hr-stat">
        <div class="stat-item">
            <div class="stat-label">最小心率</div>
            <div class="stat-value min" id="minHr">0</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">平均心率</div>
            <div class="stat-value avg" id="avgHr">0</div>
        </div>
        <div class="stat-item">
            <div class="stat-label">最大心率</div>
            <div class="stat-value max" id="maxHr">0</div>
        </div>
    </div>

    <h3>心率曲线</h3>
    <div class="chart-container">
        <canvas id="hrChart"></canvas>
    </div>

    <button id="downloadBtn" onclick="downloadCsv()">下载全量心率数据（CSV）</button>
</div>

<script>
    const WS_BASE_URL = "wss://app.hyperate.io/socket/websocket";
    const TOKEN = "astobRkornAHAizEZGIo3pVYBDHyrkEtw8v2AEP804fpQ0G4uRh0OHT3vtgBPTy2";

    let ws = null;
    let heartbeatTimer = null;
    let reconnectTimer = null;
    let refCounter = 20;
    let allRecords = [];
    let chart = null;
    let isManualStop = false;

    const RANGE_CONFIG = {
        "1m": 60,
        "5m": 300,
        "10m": 600,
        "30m": 1800,
        "all": null
    };

    // 初始化图表
    function initChart() {
        const ctx = document.getElementById("hrChart").getContext("2d");
        chart = new Chart(ctx, {
            type: "line",
            data: { labels: [], datasets: [{
                    label: "心率 (BPM)",
                    data: [],
                    borderColor: "#ff4d4d",
                    backgroundColor: "rgba(255,77,77,0.12)",
                    tension: 0.4,
                    fill: true,
                    pointRadius: 3
                }]},
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { min:40, max:200, grid: { color:"#334155" }, ticks: { color:"#f8fafc" }},
                    x: { grid: { color:"#334155" }, ticks: { color:"#f8fafc" }}
                },
                plugins: { legend: { labels: { color:"#f8fafc" }}}
            }
        });
    }

    // 获取当前筛选的数据
    function getDisplayData() {
        const key = document.getElementById("timeRangeSelect").value;
        const sec = RANGE_CONFIG[key];
        const now = Date.now();

        if (!sec) return [...allRecords];

        return allRecords.filter(item => {
            return now - item.ts <= sec * 1000;
        });
    }

    // 刷新统计
    function updateStats() {
        const list = getDisplayData();
        if (list.length === 0) {
            document.getElementById("minHr").innerText = 0;
            document.getElementById("avgHr").innerText = 0;
            document.getElementById("maxHr").innerText = 0;
            return;
        }
        const hrs = list.map(x => x.hr);
        const min = Math.min(...hrs);
        const max = Math.max(...hrs);
        const avg = (hrs.reduce((a,b)=>a+b,0)/hrs.length).toFixed(1);

        document.getElementById("minHr").innerText = min;
        document.getElementById("avgHr").innerText = avg;
        document.getElementById("maxHr").innerText = max;
    }

    // 刷新图表
    function updateChart() {
        const list = getDisplayData();
        chart.data.labels = list.map(x => x.time);
        chart.data.datasets[0].data = list.map(x => x.hr);
        chart.update();
    }

    // 统一刷新
    function refreshAll() {
        updateChart();
        updateStats();
    }

    // WS 连接
    function connectWs(deviceId) {
        if (ws) ws.close();
        clearInterval(heartbeatTimer);
        clearTimeout(reconnectTimer);
        if (isManualStop) return;

        const wsUrl = `${WS_BASE_URL}?token=${TOKEN}`;
        const topic = `hr:${deviceId}`;
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            setStatus("✅ 已连接，订阅频道...");
            ws.send(JSON.stringify({ topic, event:"phx_join", payload:{}, ref:refCounter++ }));
            heartbeatTimer = setInterval(() => {
                if (ws.readyState === 1) {
                    ws.send(JSON.stringify({ topic:"phoenix", event:"heartbeat", payload:{}, ref:refCounter++ }));
                }
            }, 25000);
        };

        ws.onmessage = (e) => {
            try {
                const msg = JSON.parse(e.data);
                if (msg.event === "hr_update" && msg.payload.hr != null) {
                    const hr = Number(msg.payload.hr);
                    const time = new Date().toLocaleTimeString();
                    const ts = Date.now();
                    document.getElementById("currentHr").innerText = hr;
                    setStatus(`✅ ${time}`);
                    allRecords.push({ time, hr, ts });
                    refreshAll();
                }
            } catch (e) {}
        };

        ws.onclose = () => {
            if (!isManualStop) {
                setStatus("🔄 断开，2秒后重连...");
                reconnectTimer = setTimeout(() => connectWs(deviceId), 2000);
            }
        };

        ws.onerror = () => {
            if (!isManualStop) {
                setStatus("⚠️ 错误，2秒后重连...");
                reconnectTimer = setTimeout(() => connectWs(deviceId), 2000);
            }
        };
    }

    function startConnect() {
        const id = document.getElementById("deviceIdInput").value.trim();
        if (!id) return alert("请输入设备ID");
        isManualStop = false;
        allRecords = [];
        refreshAll();
        connectWs(id);
    }

    function manualDisconnect() {
        isManualStop = true;
        clearInterval(heartbeatTimer);
        clearTimeout(reconnectTimer);
        if (ws) ws.close();
        setStatus("❌ 已手动断开");
    }

    function setStatus(t) {
        document.getElementById("statusText").innerText = t;
    }

    function downloadCsv() {
        if (allRecords.length === 0) return alert("暂无数据");
        let csv = "时间,心率(BPM)\n";
        allRecords.forEach(item => {
            csv += `${item.time},${item.hr}\n`;
        });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([csv], { type: "text/csv" }));
        a.download = "心率记录.csv";
        a.click();
    }

    window.onload = initChart;
</script>
</body>
</html>
